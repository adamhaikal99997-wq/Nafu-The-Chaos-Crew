<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nafu & The Chaos Crew</title>
    <style>
        :root {
            --dracula-bg: #282a36;
            --dracula-fg: #f8f8f2;
            --dracula-purple: #bd93f9;
            --dracula-pink: #ff79c6;
            --dracula-cyan: #8be9fd;
            --dracula-gray: #44475a;
            --dracula-green: #50fa7b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: var(--dracula-fg);
            background-color: var(--dracula-bg);
            margin: 0;
            padding: 15px;
        }

        #home-menu, .island-section {
            display: none;
            max-width: 500px;
            margin: 40px auto;
        }

        .active {
            display: flex !important;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.4s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .menu-header { text-align: center; margin-bottom: 20px; }
        .menu-header h1 { color: var(--dracula-purple); font-size: 1.8rem; }

        .island-btn {
            background-color: var(--dracula-gray);
            color: var(--dracula-cyan);
            border: 2px solid var(--dracula-purple);
            padding: 20px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            transition: 0.2s;
        }

        .island-btn:active { transform: scale(0.98); background-color: var(--dracula-purple); color: var(--dracula-bg); }

        .back-btn {
            background: none;
            border: 1px solid var(--dracula-pink);
            color: var(--dracula-pink);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
            align-self: flex-start;
        }

        .planning-dropdown, .slip-dropdown {
            background-color: var(--dracula-gray);
            border-radius: 15px;
            padding: 10px;
            border: 1px dashed var(--dracula-purple);
        }

        summary {
            font-weight: bold;
            color: var(--dracula-pink);
            text-align: center;
            padding: 10px;
            cursor: pointer;
            list-style: none;
        }

        .dropdown-content {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background-color: #343746;
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid var(--dracula-purple);
        }
    </style>
</head>
<body>

    <div id="home-menu" class="active">
        <div class="menu-header">
            <h1>💅 Nafu & The Chaos Crew</h1>
        </div>

        <details class="planning-dropdown">
            <summary>📂 Planning Section</summary>
            <div class="dropdown-content">
                <button class="island-btn" onclick="showIsland('thulusdhoo')">K. Thulusdhoo 🏝️</button>
                <button class="island-btn" onclick="showIsland('dhiffushi')">K. Dhiffushi 🌊</button>
                <button class="island-btn" onclick="showIsland('huraa')">K. Huraa ⛵</button>
            </div>
        </details>

        <button class="island-btn" style="border-color: var(--dracula-green);" onclick="showIsland('budget-section')">
            💰 Budget Section 📊
        </button>
    </div>

    <div id="budget-section" class="island-section">
        <button class="back-btn" onclick="goHome()">← Back to Menu</button>
        <h1 style="text-align: center; color: var(--dracula-pink);">💰 Budget Central</h1>

        <details class="slip-dropdown">
            <summary>📑 Transfer Slips</summary>
            <div class="dropdown-content">
                <div class="card" style="border-color: var(--dracula-green);">
                    <p style="text-align: center; font-size: 0.9rem;">Upload payment slips here:</p>
                    <input type="file" id="slip-upload" accept="image/*" style="display: none;">
                    <label for="slip-upload" class="island-btn" style="border-color: var(--dracula-green); justify-content: center; padding: 15px;">
                        📤 Upload New Slip
                    </label>
                    <div style="margin-top: 20px; height: 300px; background: #282a36; border-radius: 10px; overflow: hidden;">
                        <iframe src="YOUR_SHARED_FOLDER_LINK" style="width: 100%; height: 100%; border: none;"></iframe>
                    </div>
                </div>
            </div>
        </details>
    </div>

    <div id="thulusdhoo" class="island-section">
        <button class="back-btn" onclick="goHome()">← Back to Menu</button>
        <h1>🏝️ K. Thulusdhoo</h1>
        <div class="card">Itinerary details here...</div>
    </div>
    <div id="dhiffushi" class="island-section">
        <button class="back-btn" onclick="goHome()">← Back to Menu</button>
        <h1>🌊 K. Dhiffushi</h1>
        <div class="card">Itinerary details here...</div>
    </div>
    <div id="huraa" class="island-section">
        <button class="back-btn" onclick="goHome()">← Back to Menu</button>
        <h1>⛵ K. Huraa</h1>
        <div class="card">Itinerary details here...</div>
    </div>

    <script>
        function showIsland(id) {
            document.getElementById('home-menu').classList.remove('active');
            document.querySelectorAll('.island-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function goHome() {
            document.querySelectorAll('.island-section').forEach(s => s.classList.remove('active'));
            document.getElementById('home-menu').classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
